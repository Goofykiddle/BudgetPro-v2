<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetPro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6750A4',
                        'on-primary': '#FFFFFF',
                        'primary-container': '#EADDFF',
                        'on-primary-container': '#21005D',
                        secondary: '#625B71',
                        'on-secondary': '#FFFFFF',
                        'secondary-container': '#E8DEF8',
                        'on-secondary-container': '#1D192B',
                        tertiary: '#7D5260',
                        'on-tertiary': '#FFFFFF',
                        'tertiary-container': '#FFD8E4',
                        'on-tertiary-container': '#31111D',
                        error: '#B3261E',
                        'on-error': '#FFFFFF',
                        'error-container': '#F9DEDC',
                        'on-error-container': '#410E0B',
                        background: '#FFFBFE',
                        'on-background': '#1C1B1F',
                        surface: '#FFFBFE',
                        'on-surface': '#1C1B1F',
                        'surface-variant': '#E7E0EC',
                        'on-surface-variant': '#49454F',
                        outline: '#79747E',
                    }
                }
            }
        }
    </script>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Transitions */
        .page-transition {
            transition: opacity 0.2s ease-in-out;
        }

        /* Home Category Chart (MAX-like layout) */
        .home-cat-wrap {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 44%;
            gap: 10px;
            align-items: center;
            direction: rtl;
        }
        .home-cat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }
        .home-cat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-height: 44px;
        }
        .home-cat-amount-row {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.05;
        }
        .home-cat-amount {
            font-size: 1.9rem;
            font-weight: 800;
            white-space: nowrap;
        }
        .home-cat-name {
            font-size: 1.05rem;
            color: #5f5b66;
            line-height: 1.1;
            margin-top: 2px;
            white-space: nowrap;
        }
        .home-cat-icon {
            font-size: 1.1rem;
            color: #6750A4;
        }
        .home-cat-donut-col {
            display: flex;
            justify-content: center;
        }
        .home-cat-donut-box {
            width: 160px;
            height: 160px;
            position: relative;
            flex-shrink: 0;
        }
        .home-cat-donut-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            text-align: center;
            line-height: 1.1;
            font-size: 1.3rem;
            color: #1C1B1F;
        }
        @media (min-width: 768px) {
            .home-cat-wrap { grid-template-columns: minmax(0, 1fr) 46%; }
            .home-cat-donut-box { width: 220px; height: 220px; }
            .home-cat-amount { font-size: 2.2rem; }
            .home-cat-name { font-size: 1.35rem; }
            .home-cat-donut-label { font-size: 2rem; }
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
    <div id="app">
        <!-- App content will be injected here -->
        <div id="loading-screen" class="fixed inset-0 flex items-center justify-center bg-background z-50">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                <p class="text-primary font-medium">טוען...</p>
            </div>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden">
        <div id="modal-backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
        <div id="modal-content" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-8 shadow-2xl transform translate-y-full transition-transform duration-300 max-w-2xl mx-auto overflow-y-auto max-h-[90vh]">
            <!-- Modal content will be injected here -->
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
